name: PR Hygiene - Jira Ticket in Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-jira-ticket:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@f6bb565e7d31fa3013a1a75c5f80aed44c3bde5c # v3.4.1
    with:
      pr_title: ${{ github.event.pull_request.title }}
      pr-labels: ${{ toJSON(github.event.pull_request.labels.*.name) }}
